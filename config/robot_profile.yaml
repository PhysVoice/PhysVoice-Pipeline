# ─────────────────────────────────────────────────────────────
# SO101 로봇/카메라 프로필 (이 PC·이 로봇 기준)
#
# bridge/dispatcher 가 lerobot-record 인자를 만들 때 사용.
# PC/로봇이 바뀌면 여기만 수정하면 됨.
# (값 출처: smolvla-red-blue-training/robot/eval.sh)
# 카메라 노드는 이 PC(rtx3090)에서 프레임 캡처로 검증·정정함:
#   wrist=/dev/video0(그리퍼 근접), top=/dev/video2(작업대 탑다운).  2026-06-09
# ─────────────────────────────────────────────────────────────

robot:
  type: so101_follower
  id: my_follower
  port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5AE6085270-if00
  # 캘리브레이션: 레포 내 calibration/ 에서 자동 인식
  calibration_dir: calibration/robots/so101_follower

cameras:
  wrist:
    type: opencv
    index_or_path: /dev/video0
    width: 640
    height: 480
    fps: 30
    fourcc: MJPG
  top:
    type: opencv
    index_or_path: /dev/video2
    width: 640
    height: 480
    fps: 30
    fourcc: MJPG

inference:
  device: ""          # "" = 정책 기본(cuda) → 없으면 cpu 폴백 / "cuda" / "cpu"
  # 한 명령당 로봇이 정책을 실행하는 고정 시간(초). lerobot-record 는 키 입력이 없으면
  # 이 시간만큼 끝까지 동작한다. 단일 pick&place 에 맞춰 조정할 것.
  episode_time_s: 60
  fps: 30

# ── 하드웨어 값 환경변수 덮어쓰기 (PC/로봇 다를 때) ──
#   ROBOT_PORT, WRIST_CAM, TOP_CAM, INFERENCE_DEVICE
#   PHYSVOICE_DATASET_ROOT, PHYSVOICE_DATASET_REPO (임시 데이터셋 위치/이름)
